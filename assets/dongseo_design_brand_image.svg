  <path d="M570 350 L570 380 L540 380" fill="none" stroke="#c8a96e" stroke-width="1" stroke-linecap="round" style="fill:none;stroke:rgb(200, 169, 110);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

